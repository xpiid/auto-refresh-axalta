<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kiosk Launcher</title>
<style>
body {
background: black;
color: white;
font-family: Arial;
text-align: center;
padding-top: 80px;
}
button {
font-size: 24px;
padding: 20px;
margin: 20px;
}
</style>
</head>
<body>

<h1>Job Kiosk</h1>

<button onclick="openJob()">Open Job Page</button>

<script>
function openJob() {
const win = window.open("https://phoenix.spieshecker.com/pt/JobBrowser.mvc");

// try to inject auto-refresh after load
const timer = setInterval(() => {
try {
win.eval("setInterval(function(){ location.reload(); }, 300000);");
clearInterval(timer);
} catch (e) {}
}, 2000);
}
</script>

</body>
</html>
